<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sarah Rent Tracker</title>
  <script src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link
    href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css"
    rel="stylesheet"
  />
</head>
<body>
  <div id="root"></div>

  <script src="./config.js"></script>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      deleteDoc,
      doc,
      onSnapshot
    } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

    if (!window.FIREBASE_CONFIG) {
      console.error("Missing Firebase config. Make sure config.js is loaded.");
      window.firebaseInitError = "Missing Firebase config";
      window.dispatchEvent(new Event("firebaseInitError"));
    } else {
      const app = initializeApp(window.FIREBASE_CONFIG);
      const db = getFirestore(app);

      window.firebase = {
        db,
        collection,
        addDoc,
        deleteDoc,
        doc,
        onSnapshot
      };

      window.firebaseReady = true;
      window.dispatchEvent(new Event("firebaseReady"));
    }
  </script>

  <script type="text/babel">
    function App() {
      const [selectedDate, setSelectedDate] = React.useState(
        new Date().toISOString().split("T")[0]
      );
      const [payments, setPayments] = React.useState([]);
      const [newPayment, setNewPayment] = React.useState({
        item: "",
        cost: "",
        datePaid: ""
      });
      const [showAddForm, setShowAddForm] = React.useState(false);
      const [loading, setLoading] = React.useState(true);
      const [error, setError] = React.useState("");
      
      // PIN Login State
      const [authenticated, setAuthenticated] = React.useState(false);
      const [pinInput, setPinInput] = React.useState("");
      const [pinError, setPinError] = React.useState("");

      const monthlyRent = 1100;
      const moveInDate = new Date("2025-11-15T00:00:00");

      React.useEffect(() => {
        let unsubscribe = null;
        let cancelled = false;

        async function init() {
          try {
            if (!window.firebaseReady) {
              await new Promise((resolve, reject) => {
                const onReady = () => {
                  cleanup();
                  resolve();
                };
                const onError = () => {
                  cleanup();
                  reject(new Error(window.firebaseInitError || "Firebase failed to initialize"));
                };
                const cleanup = () => {
                  window.removeEventListener("firebaseReady", onReady);
                  window.removeEventListener("firebaseInitError", onError);
                };

                window.addEventListener("firebaseReady", onReady, { once: true });
                window.addEventListener("firebaseInitError", onError, { once: true });
              });
            }

            if (cancelled) return;

            const { db, collection, onSnapshot } = window.firebase;

            unsubscribe = onSnapshot(
              collection(db, "payments"),
              (snapshot) => {
                const paymentsData = snapshot.docs.map((d) => ({
                  id: d.id,
                  ...d.data()
                }));

                paymentsData.sort((a, b) => new Date(b.datePaid) - new Date(a.datePaid));

                if (!cancelled) {
                  setPayments(paymentsData);
                  setLoading(false);
                }
              },
              (err) => {
                console.error("Error loading payments:", err);
                if (!cancelled) {
                  setError("Could not load payments.");
                  setLoading(false);
                }
              }
            );
          } catch (err) {
            console.error(err);
            if (!cancelled) {
              setError(err.message || "Failed to initialize app.");
              setLoading(false);
            }
          }
        }

        init();

        return () => {
          cancelled = true;
          if (unsubscribe) unsubscribe();
        };
      }, []);

      const handleUnlock = () => {
        if (pinInput === window.APP_PIN) {
          setAuthenticated(true);
          setPinError("");
        } else {
          setPinError("Incorrect PIN. Try again.");
          setPinInput("");
        }
      };

      const calculateMonthsPassed = (fromDate, toDate) => {
        const start = new Date(fromDate);
        const end = new Date(toDate);
        if (end < start) return 0;
        let months = (end.getFullYear() - start.getFullYear()) * 12 + (end.getMonth() - start.getMonth());
        if (end.getDate() >= start.getDate()) { months += 1; }
        return Math.max(months, 1);
      };

      const calculateOwed = (checkDate) => {
        const check = new Date(`${checkDate}T00:00:00`);
        const monthsPassed = calculateMonthsPassed(moveInDate, check);
        const totalOwed = monthsPassed * monthlyRent;
        const totalPaid = payments
          .filter((p) => new Date(`${p.datePaid}T00:00:00`) <= check)
          .reduce((sum, p) => sum + Number(p.cost || 0), 0);
        return { totalOwed, totalPaid, balance: totalOwed - totalPaid, monthsPassed };
      };

      const handleAddPayment = async () => {
        const item = newPayment.item.trim();
        const cost = parseFloat(newPayment.cost);
        const datePaid = newPayment.datePaid;
        if (!item || !datePaid || Number.isNaN(cost) || cost <= 0) {
          alert("Please enter a valid item, cost, and payment date.");
          return;
        }
        try {
          const { db, collection, addDoc } = window.firebase;
          await addDoc(collection(db, "payments"), {
            item, cost, datePaid, createdAt: new Date().toISOString()
          });
          setNewPayment({ item: "", cost: "", datePaid: "" });
          setShowAddForm(false);
        } catch (err) {
          console.error("Error adding payment:", err);
          alert("Error adding payment. Please try again.");
        }
      };

      const handleDeletePayment = async (paymentId) => {
        try {
          const { db, doc, deleteDoc } = window.firebase;
          await deleteDoc(doc(db, "payments", paymentId));
        } catch (err) {
          console.error("Error deleting payment:", err);
          alert("Error deleting payment. Please try again.");
        }
      };

      if (loading) {
        return (
          <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center">
            <div className="text-2xl font-bold text-indigo-900">Loading...</div>
          </div>
        );
      }

      if (error) {
        return (
          <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-6">
            <div className="bg-white rounded-lg shadow-lg p-6 max-w-lg w-full">
              <h1 className="text-2xl font-bold text-red-700 mb-2">App Error</h1>
              <p className="text-gray-700">{error}</p>
            </div>
          </div>
        );
      }

      if (!authenticated) {
        return (
          <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4">
            <div className="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-sm text-center">
              <h1 className="text-3xl font-bold text-indigo-900 mb-2">Sarah Tracker</h1>
              <p className="text-gray-500 mb-8">Enter your 4-digit PIN</p>
              <input
                type="password"
                inputMode="numeric"
                maxLength="4"
                value={pinInput}
                onChange={(e) => setPinInput(e.target.value)}
                onKeyDown={(e) => e.key === "Enter" && handleUnlock()}
                placeholder="••••"
                className="w-full text-center text-4xl tracking-widest px-4 py-4 border-2 border-indigo-100 rounded-xl focus:outline-none focus:border-indigo-500 mb-4 bg-gray-50"
              />
              <button
                onClick={handleUnlock}
                className="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-indigo-700 transition-colors shadow-lg"
              >
                Unlock Dashboard
              </button>
              {pinError && <p className="text-red-500 mt-4 font-medium">{pinError}</p>}
            </div>
          </div>
        );
      }

      const result = calculateOwed(selectedDate);

      return (
        <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4 md:p-8">
          <div className="max-w-4xl mx-auto">
            <h1 className="text-3xl md:text-4xl font-bold text-center text-indigo-900 mb-8">
              Sarah Rent Tracker Dashboard
            </h1>

            <div className="bg-white rounded-2xl shadow-xl p-6 mb-6">
              <div className="mb-6">
                <label className="block text-sm font-bold text-gray-500 uppercase tracking-wider mb-2">
                  Check Balance For Date:
                </label>
                <input
                  type="date"
                  value={selectedDate}
                  onChange={(e) => setSelectedDate(e.target.value)}
                  className="w-full px-4 py-3 border-2 border-indigo-50 rounded-lg text-lg focus:outline-none focus:border-indigo-500 bg-gray-50"
                />
              </div>

              <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <div className="bg-blue-50 p-4 rounded-xl border border-blue-100">
                  <p className="text-xs font-bold text-blue-400 uppercase mb-1">Months Passed</p>
                  <p className="text-2xl font-bold text-blue-700">{result.monthsPassed}</p>
                </div>
                <div className="bg-red-50 p-4 rounded-xl border border-red-100">
                  <p className="text-xs font-bold text-red-400 uppercase mb-1">Total Owed</p>
                  <p className="text-2xl font-bold text-red-700">${result.totalOwed.toLocaleString()}</p>
                </div>
                <div className="bg-green-50 p-4 rounded-xl border border-green-100">
                  <p className="text-xs font-bold text-green-400 uppercase mb-1">Total Paid</p>
                  <p className="text-2xl font-bold text-green-700">${result.totalPaid.toLocaleString()}</p>
                </div>
              </div>

              <div className={`p-6 rounded-2xl border-2 ${result.balance > 0 ? "bg-red-600 border-red-700 text-white" : "bg-green-600 border-green-700 text-white"}`}>
                <p className="text-sm font-bold uppercase opacity-80 mb-1">Current Balance:</p>
                <p className="text-4xl font-black">
                  ${Math.abs(result.balance).toLocaleString()} {result.balance > 0 ? "OWED" : "CREDIT"}
                </p>
              </div>
            </div>

            <div className="bg-white rounded-2xl shadow-xl p-6">
              <div className="flex justify-between items-center mb-6">
                <h2 className="text-xl font-bold text-gray-800">Payment History</h2>
                <button
                  onClick={() => setShowAddForm(!showAddForm)}
                  className="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 font-bold transition-colors"
                >
                  {showAddForm ? "Close" : "+ Add New"}
                </button>
              </div>

              {showAddForm && (
                <div className="bg-indigo-50 p-6 rounded-xl mb-6 border border-indigo-100">
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                    <div>
                      <label className="block text-xs font-bold text-indigo-400 uppercase mb-1">Item</label>
                      <input
                        type="text"
                        placeholder="e.g. Rent Payment"
                        value={newPayment.item}
                        onChange={(e) => setNewPayment({ ...newPayment, item: e.target.value })}
                        className="w-full px-3 py-2 border border-indigo-200 rounded bg-white"
                      />
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-indigo-400 uppercase mb-1">Amount</label>
                      <input
                        type="number"
                        placeholder="0.00"
                        value={newPayment.cost}
                        onChange={(e) => setNewPayment({ ...newPayment, cost: e.target.value })}
                        className="w-full px-3 py-2 border border-indigo-200 rounded bg-white"
                      />
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-indigo-400 uppercase mb-1">Date</label>
                      <input
                        type="date"
                        value={newPayment.datePaid}
                        onChange={(e) => setNewPayment({ ...newPayment, datePaid: e.target.value })}
                        className="w-full px-3 py-2 border border-indigo-200 rounded bg-white"
                      />
                    </div>
                  </div>
                  <button
                    onClick={handleAddPayment}
                    className="w-full bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700 transition-colors"
                  >
                    Save Payment Record
                  </button>
                </div>
              )}

              <div className="overflow-x-auto">
                <table className="w-full">
                  <thead>
                    <tr className="text-left border-b-2 border-gray-100">
                      <th className="pb-4 font-bold text-gray-400 uppercase text-xs">Item</th>
                      <th className="pb-4 font-bold text-gray-400 uppercase text-xs">Amount</th>
                      <th className="pb-4 font-bold text-gray-400 uppercase text-xs">Date</th>
                      <th className="pb-4 font-bold text-gray-400 uppercase text-xs text-right">Action</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-gray-50">
                    {payments.length === 0 ? (
                      <tr><td colSpan="4" className="py-8 text-center text-gray-400">No records found</td></tr>
                    ) : (
                      payments.map((payment) => (
                        <tr key={payment.id} className="hover:bg-gray-50 transition-colors">
                          <td className="py-4 font-medium text-gray-700">{payment.item}</td>
                          <td className="py-4 font-bold text-indigo-600">${Number(payment.cost).toLocaleString()}</td>
                          <td className="py-4 text-gray-500">{new Date(`${payment.datePaid}T00:00:00`).toLocaleDateString()}</td>
                          <td className="py-4 text-right">
                            <button
                              onClick={() => handleDeletePayment(payment.id)}
                              className="text-red-400 hover:text-red-600 font-bold text-sm"
                            >
                              Delete
                            </button>
                          </td>
                        </tr>
                      ))
                    )}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById("root"));
  </script>
</body>
</html>
