<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sarah Rent Tracker</title>
  <script src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>
  <link
    href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css"
    rel="stylesheet"
  />
</head>
<body>
  <div id="root"></div>

  <script src="./config.js"></script>

  <!-- Firebase compat SDK: plain global scripts, no modules, no build step needed -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

  <script>
    var firebaseOk = !!window.FIREBASE_CONFIG;
    var db, auth;
    if (!firebaseOk) {
      console.error("Missing Firebase config. Make sure config.js is loaded before this script.");
    } else {
      firebase.initializeApp(window.FIREBASE_CONFIG);
      db = firebase.firestore();
      auth = firebase.auth();
    }
  </script>

  <!-- App: plain JavaScript, no JSX, no Babel required -->
  <script>
    var e = React.createElement;

    function App() {
      var useState = React.useState;
      var useEffect = React.useEffect;

      var dateState = useState(new Date().toISOString().split("T")[0]);
      var selectedDate = dateState[0], setSelectedDate = dateState[1];

      var paymentsState = useState([]);
      var payments = paymentsState[0], setPayments = paymentsState[1];

      var newPaymentState = useState({ item: "", cost: "", datePaid: "" });
      var newPayment = newPaymentState[0], setNewPayment = newPaymentState[1];

      var showAddFormState = useState(false);
      var showAddForm = showAddFormState[0], setShowAddForm = showAddFormState[1];

      var loadingState = useState(true);
      var loading = loadingState[0], setLoading = loadingState[1];

      var errorState = useState("");
      var error = errorState[0], setError = errorState[1];

      var userState = useState(null);
      var user = userState[0], setUser = userState[1];

      var authReadyState = useState(false);
      var authReady = authReadyState[0], setAuthReady = authReadyState[1];

      var emailState = useState("");
      var email = emailState[0], setEmail = emailState[1];

      var passwordState = useState("");
      var password = passwordState[0], setPassword = passwordState[1];

      var loginErrorState = useState("");
      var loginError = loginErrorState[0], setLoginError = loginErrorState[1];

      var loginLoadingState = useState(false);
      var loginLoading = loginLoadingState[0], setLoginLoading = loginLoadingState[1];

      var monthlyRent = 1100;
      var moveInDate = new Date("2025-11-15T00:00:00");

      useEffect(function () {
        if (!firebaseOk) {
          setError("Missing Firebase config.");
          setAuthReady(true);
          setLoading(false);
          return;
        }
        var unsubscribe = auth.onAuthStateChanged(function (firebaseUser) {
          setUser(firebaseUser);
          setAuthReady(true);
          if (!firebaseUser) {
            setLoading(false);
          }
        });
        return function () { unsubscribe(); };
      }, []);

      useEffect(function () {
        if (!user) return;
        var unsubscribe = db.collection("payments").onSnapshot(
          function (snapshot) {
            var paymentsData = snapshot.docs.map(function (d) {
              var data = d.data();
              data.id = d.id;
              return data;
            });
            paymentsData.sort(function (a, b) {
              return new Date(b.datePaid) - new Date(a.datePaid);
            });
            setPayments(paymentsData);
            setLoading(false);
          },
          function (err) {
            console.error("Error loading payments:", err);
            setError("Could not load payments.");
            setLoading(false);
          }
        );
        return function () { unsubscribe(); };
      }, [user]);

      function handleLogin() {
        setLoginError("");
        setLoginLoading(true);
        auth.signInWithEmailAndPassword(email, password)
          .catch(function () {
            setLoginError("Incorrect email or password. Please try again.");
          })
          .finally(function () {
            setLoginLoading(false);
          });
      }

      function handleLogout() {
        auth.signOut().then(function () {
          setUser(null);
          setPayments([]);
          setLoading(true);
        });
      }

      function calculateMonthsPassed(fromDate, toDate) {
        var start = new Date(fromDate);
        var end = new Date(toDate);
        if (end < start) return 0;
        var months = (end.getFullYear() - start.getFullYear()) * 12 + (end.getMonth() - start.getMonth());
        if (end.getDate() >= start.getDate()) { months += 1; }
        return Math.max(months, 1);
      }

      function calculateOwed(checkDate) {
        var check = new Date(checkDate + "T00:00:00");
        var monthsPassed = calculateMonthsPassed(moveInDate, check);
        var totalOwed = monthsPassed * monthlyRent;
        var totalPaid = payments
          .filter(function (p) { return new Date(p.datePaid + "T00:00:00") <= check; })
          .reduce(function (sum, p) { return sum + Number(p.cost || 0); }, 0);
        return { totalOwed: totalOwed, totalPaid: totalPaid, balance: totalOwed - totalPaid, monthsPassed: monthsPassed };
      }

      function handleAddPayment() {
        var item = newPayment.item.trim();
        var cost = parseFloat(newPayment.cost);
        var datePaid = newPayment.datePaid;
        if (!item || !datePaid || isNaN(cost) || cost <= 0) {
          alert("Please enter a valid item, cost, and payment date.");
          return;
        }
        db.collection("payments").add({
          item: item,
          cost: cost,
          datePaid: datePaid,
          createdAt: new Date().toISOString()
        }).then(function () {
          setNewPayment({ item: "", cost: "", datePaid: "" });
          setShowAddForm(false);
        }).catch(function (err) {
          console.error("Error adding payment:", err);
          alert("Error adding payment. Please try again.");
        });
      }

      function handleDeletePayment(paymentId) {
        db.collection("payments").doc(paymentId).delete().catch(function (err) {
          console.error("Error deleting payment:", err);
          alert("Error deleting payment. Please try again.");
        });
      }

      if (!authReady) {
        return e("div", { className: "min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center" },
          e("div", { className: "text-2xl font-bold text-indigo-900" }, "Loading...")
        );
      }

      if (error) {
        return e("div", { className: "min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-6" },
          e("div", { className: "bg-white rounded-lg shadow-lg p-6 max-w-lg w-full" },
            e("h1", { className: "text-2xl font-bold text-red-700 mb-2" }, "App Error"),
            e("p", { className: "text-gray-700" }, error)
          )
        );
      }

      if (!user) {
        return e("div", { className: "min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4" },
          e("div", { className: "bg-white rounded-2xl shadow-2xl p-8 w-full max-w-sm text-center" },
            e("h1", { className: "text-3xl font-bold text-indigo-900 mb-2" }, "Sarah Tracker"),
            e("p", { className: "text-gray-500 mb-8" }, "Sign in to access the dashboard"),
            e("input", {
              type: "email",
              placeholder: "Email",
              value: email,
              onChange: function (ev) { setEmail(ev.target.value); },
              onKeyDown: function (ev) { if (ev.key === "Enter") handleLogin(); },
              className: "w-full px-4 py-3 border-2 border-indigo-100 rounded-xl focus:outline-none focus:border-indigo-500 mb-3 bg-gray-50 text-lg"
            }),
            e("input", {
              type: "password",
              placeholder: "Password",
              value: password,
              onChange: function (ev) { setPassword(ev.target.value); },
              onKeyDown: function (ev) { if (ev.key === "Enter") handleLogin(); },
              className: "w-full px-4 py-3 border-2 border-indigo-100 rounded-xl focus:outline-none focus:border-indigo-500 mb-4 bg-gray-50 text-lg"
            }),
            e("button", {
              onClick: handleLogin,
              disabled: loginLoading,
              className: "w-full bg-indigo-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-indigo-700 transition-colors shadow-lg disabled:opacity-50"
            }, loginLoading ? "Signing in..." : "Sign In"),
            loginError ? e("p", { className: "text-red-500 mt-4 font-medium" }, loginError) : null
          )
        );
      }

      if (loading) {
        return e("div", { className: "min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center" },
          e("div", { className: "text-2xl font-bold text-indigo-900" }, "Loading...")
        );
      }

      var result = calculateOwed(selectedDate);

      return e("div", { className: "min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4 md:p-8" },
        e("div", { className: "max-w-4xl mx-auto" },
          e("div", { className: "flex justify-between items-center mb-8" },
            e("h1", { className: "text-3xl md:text-4xl font-bold text-center text-indigo-900" }, "Sarah Rent Tracker Dashboard"),
            e("button", {
              onClick: handleLogout,
              className: "text-sm text-gray-400 hover:text-red-500 font-medium transition-colors"
            }, "Sign Out")
          ),

          e("div", { className: "bg-white rounded-2xl shadow-xl p-6 mb-6" },
            e("div", { className: "mb-6" },
              e("label", { className: "block text-sm font-bold text-gray-500 uppercase tracking-wider mb-2" }, "Check Balance For Date:"),
              e("input", {
                type: "date",
                value: selectedDate,
                onChange: function (ev) { setSelectedDate(ev.target.value); },
                className: "w-full px-4 py-3 border-2 border-indigo-50 rounded-lg text-lg focus:outline-none focus:border-indigo-500 bg-gray-50"
              })
            ),

            e("div", { className: "grid grid-cols-1 md:grid-cols-3 gap-4 mb-6" },
              e("div", { className: "bg-blue-50 p-4 rounded-xl border border-blue-100" },
                e("p", { className: "text-xs font-bold text-blue-400 uppercase mb-1" }, "Months Passed"),
                e("p", { className: "text-2xl font-bold text-blue-700" }, result.monthsPassed)
              ),
              e("div", { className: "bg-red-50 p-4 rounded-xl border border-red-100" },
                e("p", { className: "text-xs font-bold text-red-400 uppercase mb-1" }, "Total Owed"),
                e("p", { className: "text-2xl font-bold text-red-700" }, "$" + result.totalOwed.toLocaleString())
              ),
              e("div", { className: "bg-green-50 p-4 rounded-xl border border-green-100" },
                e("p", { className: "text-xs font-bold text-green-400 uppercase mb-1" }, "Total Paid"),
                e("p", { className: "text-2xl font-bold text-green-700" }, "$" + result.totalPaid.toLocaleString())
              )
            ),

            e("div", { className: "p-6 rounded-2xl border-2 " + (result.balance > 0 ? "bg-red-600 border-red-700 text-white" : "bg-green-600 border-green-700 text-white") },
              e("p", { className: "text-sm font-bold uppercase opacity-80 mb-1" }, "Current Balance:"),
              e("p", { className: "text-4xl font-black" }, "$" + Math.abs(result.balance).toLocaleString() + " " + (result.balance > 0 ? "OWED" : "CREDIT"))
            )
          ),

          e("div", { className: "bg-white rounded-2xl shadow-xl p-6" },
            e("div", { className: "flex justify-between items-center mb-6" },
              e("h2", { className: "text-xl font-bold text-gray-800" }, "Payment History"),
              e("button", {
                onClick: function () { setShowAddForm(!showAddForm); },
                className: "bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 font-bold transition-colors"
              }, showAddForm ? "Close" : "+ Add New")
            ),

            showAddForm ? e("div", { className: "bg-indigo-50 p-6 rounded-xl mb-6 border border-indigo-100" },
              e("div", { className: "grid grid-cols-1 md:grid-cols-3 gap-4 mb-4" },
                e("div", null,
                  e("label", { className: "block text-xs font-bold text-indigo-400 uppercase mb-1" }, "Item"),
                  e("input", {
                    type: "text",
                    placeholder: "e.g. Rent Payment",
                    value: newPayment.item,
                    onChange: function (ev) { setNewPayment(Object.assign({}, newPayment, { item: ev.target.value })); },
                    className: "w-full px-3 py-2 border border-indigo-200 rounded bg-white"
                  })
                ),
                e("div", null,
                  e("label", { className: "block text-xs font-bold text-indigo-400 uppercase mb-1" }, "Amount"),
                  e("input", {
                    type: "number",
                    placeholder: "0.00",
                    value: newPayment.cost,
                    onChange: function (ev) { setNewPayment(Object.assign({}, newPayment, { cost: ev.target.value })); },
                    className: "w-full px-3 py-2 border border-indigo-200 rounded bg-white"
                  })
                ),
                e("div", null,
                  e("label", { className: "block text-xs font-bold text-indigo-400 uppercase mb-1" }, "Date"),
                  e("input", {
                    type: "date",
                    value: newPayment.datePaid,
                    onChange: function (ev) { setNewPayment(Object.assign({}, newPayment, { datePaid: ev.target.value })); },
                    className: "w-full px-3 py-2 border border-indigo-200 rounded bg-white"
                  })
                )
              ),
              e("button", {
                onClick: handleAddPayment,
                className: "w-full bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700 transition-colors"
              }, "Save Payment Record")
            ) : null,

            e("div", { className: "overflow-x-auto" },
              e("table", { className: "w-full" },
                e("thead", null,
                  e("tr", { className: "text-left border-b-2 border-gray-100" },
                    e("th", { className: "pb-4 font-bold text-gray-400 uppercase text-xs" }, "Item"),
                    e("th", { className: "pb-4 font-bold text-gray-400 uppercase text-xs" }, "Amount"),
                    e("th", { className: "pb-4 font-bold text-gray-400 uppercase text-xs" }, "Date"),
                    e("th", { className: "pb-4 font-bold text-gray-400 uppercase text-xs text-right" }, "Action")
                  )
                ),
                e("tbody", { className: "divide-y divide-gray-50" },
                  payments.length === 0
                    ? e("tr", null, e("td", { colSpan: "4", className: "py-8 text-center text-gray-400" }, "No records found"))
                    : payments.map(function (payment) {
                        return e("tr", { key: payment.id, className: "hover:bg-gray-50 transition-colors" },
                          e("td", { className: "py-4 font-medium text-gray-700" }, payment.item),
                          e("td", { className: "py-4 font-bold text-indigo-600" }, "$" + Number(payment.cost).toLocaleString()),
                          e("td", { className: "py-4 text-gray-500" }, new Date(payment.datePaid + "T00:00:00").toLocaleDateString()),
                          e("td", { className: "py-4 text-right" },
                            e("button", {
                              onClick: function () { handleDeletePayment(payment.id); },
                              className: "text-red-400 hover:text-red-600 font-bold text-sm"
                            }, "Delete")
                          )
                        );
                      })
                )
              )
            )
          )
        )
      );
    }

    ReactDOM.render(e(App), document.getElementById("root"));
  </script>
</body>
</html>
